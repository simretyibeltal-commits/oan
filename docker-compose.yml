version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: oan_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-oan}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oan_network

  redis:
    image: redis:7-alpine
    container_name: oan_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oan_network

  cosdata:
    image: cosdatateam/cosdata:latest
    container_name: oan_cosdata
    command: ["/opt/cosdata/bin/cosdata", "--admin-key", "${COSDATA_ADMIN_KEY:-admin}", "--skip-confirmation"]
    ports:
      - "${COSDATA_HTTP_PORT:-8443}:8443"
      - "${COSDATA_GRPC_PORT:-50051}:50051"
    volumes:
      - cosdata_data:/opt/cosdata/data
    environment:
      - COSDATA_HOME=/opt/cosdata
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8443/vectordb/collections"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - oan_network

  app:
    build: .
    container_name: oan_app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cosdata:
        condition: service_healthy
    ports:
      - "8000:8000"
    expose:
      - "8000"
    volumes:
      - .:/app
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-oan}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # API Keys
      MEITY_API_KEY_VALUE: ${MEITY_API_KEY_VALUE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MAPBOX_API_TOKEN: ${MAPBOX_API_TOKEN}
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY}

      # LLM Configuration
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME}
      INFERENCE_ENDPOINT_URL: ${INFERENCE_ENDPOINT_URL}
      INFERENCE_API_KEY: ${INFERENCE_API_KEY}

      # Vector DB (Marqo)
      MARQO_ENDPOINT_URL: ${MARQO_ENDPOINT_URL}
      MARQO_INDEX_NAME: ${MARQO_INDEX_NAME}

      # Vector DB (Cosdata)
      COSDATA_HOST: cosdata
      COSDATA_HTTP_PORT: 8443
      COSDATA_GRPC_PORT: 50051
      COSDATA_ADMIN_KEY: ${COSDATA_ADMIN_KEY:-admin}

      # BAP Configuration
      BAP_ID: ${BAP_ID}
      BAP_URI: ${BAP_URI}
      BAP_ENDPOINT: ${BAP_ENDPOINT}

      # Azure Configuration
      azure_foundary_api_key: ${azure_foundary_api_key:-}
      azure_foundary_region: ${azure_foundary_region:-}

      # Nominatim Geocoding
      NOMINATIM_DOMAIN: ${NOMINATIM_DOMAIN:-}
      GEOCODING_COUNTRY_CODE: ${GEOCODING_COUNTRY_CODE:-et}

      # Moderation
      ENABLE_MODERATION: ${ENABLE_MODERATION:-false}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - oan_network
    entrypoint: /app/docker-entrypoint.sh

  omniasr:
    build: ./services/omniasr
    container_name: oan_omniasr
    ports:
      - "8001:8001"
    environment:
      - OMNIASR_MODEL=${OMNIASR_MODEL:-omniASR_LLM_7B_v2}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - oan_network

networks:
  oan_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  cosdata_data:
